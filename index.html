<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אישור הגעה - בר מצווה אלון</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Frank Ruhl Libre', serif;
  background: #e8ede8;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px 16px;
}
.card {
  max-width: 430px;
  width: 100%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  border-radius: 2px;
  overflow: hidden;
}
#bgImg { display: block; width: 100%; height: auto; }
#formWrapper {
  padding: 20px 28px 24px;
  background: linear-gradient(to bottom, rgba(245,248,244,0.97), rgba(245,248,244,0.99));
}
.event-details {
  text-align: center;
  font-size: 15px;
  font-weight: 700;
  color: #1e4d2b;
  margin-bottom: 16px;
  letter-spacing: 0.03em;
}
.form-group { margin-bottom: 14px; text-align: right; }
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: #1e4d2b;
  margin-bottom: 6px;
}
input[type="text"] {
  width: 100%;
  padding: 10px 13px;
  border: 1px solid #4a7c59;
  border-radius: 4px;
  font-size: 15px;
  font-family: inherit;
  color: #333;
  background: rgba(245,250,245,0.93);
  direction: rtl;
}
input[type="text"]:focus { outline: none; border-color: #1e4d2b; }
input[type="text"]::placeholder { color: #a0b8a0; }
.toggle-row { display: flex; gap: 10px; }
.toggle-btn {
  flex: 1;
  padding: 10px;
  border: 1px solid #4a7c59;
  border-radius: 4px;
  background: rgba(245,250,245,0.88);
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  color: #2d6b3e;
  transition: all 0.2s;
}
.toggle-btn:hover { background: rgba(235,245,237,0.97); }
.toggle-btn.yes.sel { background: #2d6b3e; border-color: #2d6b3e; color: white; }
.toggle-btn.no.sel  { background: #a84040; border-color: #a84040; color: white; }
.count-section { display: none; margin-bottom: 14px; text-align: right; }
.count-row { display: flex; align-items: center; justify-content: center; gap: 18px; margin-top: 6px; }
.count-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid #4a7c59; background: rgba(245,250,245,0.9);
  font-size: 20px; color: #1e4d2b; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit;
}
.count-btn:hover { background: #edf5ef; }
.count-num { font-size: 26px; font-weight: 900; color: #1e4d2b; min-width: 30px; text-align: center; }
.submit-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #2d6b3e 0%, #1e4d2b 100%);
  color: white;
  border: none;
  border-radius: 4px;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: opacity 0.2s, transform 0.15s;
}
.submit-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
.submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.success-box {
  display: none;
  text-align: center;
  padding: 14px;
  background: rgba(240,247,238,0.97);
  border: 1px solid #2d6b3e;
  border-radius: 4px;
  color: #1e4d2b;
  font-size: 16px;
  font-weight: 700;
  margin-top: 10px;
  animation: fadeIn 0.4s ease;
}
.success-box.show { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.admin-dot { text-align: center; margin-top: 10px; font-size: 11px; color: #8aab8e; cursor: pointer; }
.admin-dot:hover { color: #2d6b3e; }
.admin-panel { display: none; margin-top: 10px; border-top: 1px solid #c0d8c4; padding-top: 12px; }
.admin-panel.open { display: block; }
.pw-row { display: flex; gap: 8px; margin-bottom: 8px; }
.pw-input { flex:1; padding:9px 12px; border:1px solid #4a7c59; border-radius:4px; font-size:14px; font-family:inherit; background:rgba(245,250,245,0.9); }
.pw-btn { padding:9px 14px; background:#1e4d2b; color:white; border:none; border-radius:4px; cursor:pointer; font-family:inherit; font-size:14px; font-weight:700; }
.pw-err { color:#a84040; font-size:12px; margin-bottom:8px; }
.admin-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
.stat-box { background:rgba(240,248,242,0.97); border:1px solid #c0d8c4; border-radius:4px; padding:10px; text-align:center; }
.stat-num { font-size:22px; font-weight:900; color:#1e4d2b; }
.stat-lbl { font-size:11px; color:#999; margin-top:2px; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th { background:rgba(240,248,242,0.97); padding:7px; text-align:right; color:#1e4d2b; border-bottom:1px solid #c0d8c4; }
td { padding:7px; border-bottom:1px solid #e0ede2; }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; }
.badge-yes { background:#e0f0dc; color:#1e4d2b; }
.badge-no  { background:#fde8e8; color:#8a3030; }
.admin-actions { display:flex; gap:8px; margin-top:10px; }
.btn-sm { flex:1; padding:8px; border:none; border-radius:4px; cursor:pointer; font-family:inherit; font-size:13px; font-weight:700; }
.btn-export { background:#1e4d2b; color:white; }
.btn-reset  { background:#c84040; color:white; }
.btn-refresh { background:#5a7aa0; color:white; }
</style>
</head>

          <div class="stat-box"><div class="stat-num" id="aYes">0</div><div class="stat-lbl">מגיעים</div></div>
          <div class="stat-box"><div class="stat-num" id="aNo">0</div><div class="stat-lbl">לא מגיעים</div></div>
          <div class="stat-box"><div class="stat-num" id="aTotal">0</div><div class="stat-lbl">סה"כ אנשים</div></div>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>#</th><th>שם</th><th>תשובה</th><th>כמות</th></tr></thead>
            <tbody id="adminTbody"></tbody>
          </table>
        </div>
        <div class="admin-actions">
          <button class="btn-sm btn-export" onclick="exportCSV()">ייצוא CSV</button>
          <button class="btn-sm btn-refresh" onclick="loadFromSheets()">רענן</button>
          <button class="btn-sm btn-reset" onclick="resetAll()">איפוס</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
var PW = 'alon2026';
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzsoP1EUnqnfj6sy59EPIlFkBFuElBtW78uxIdK-Wc1KmJQUjmHYtmC9hej3OeSpj1E/exec';
var ans = null;
var count = 1;
var rsvpData = [];

function selectAns(v) {
  ans = v;
  var btns = document.querySelectorAll('.toggle-btn');
  for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('sel'); }
  document.querySelector('.toggle-btn.' + v).classList.add('sel');
  document.getElementById('countSection').style.display = (v === 'yes') ? 'block' : 'none';
  if (v !== 'yes') { count = 0; }
  else { count = 1; document.getElementById('countNum').textContent = '1'; }
  validate();
}

function changeCount(d) {
  count = Math.max(1, Math.min(20, count + d));
  document.getElementById('countNum').textContent = count;
}

function validate() {
  var name = document.getElementById('guestName').value.trim();
  document.getElementById('submitBtn').disabled = !(name && ans);
}

function doSubmit() {
  var name = document.getElementById('guestName').value.trim();
  if (!name || !ans) return;
  var c = (ans === 'yes') ? count : 0;
  var entry = { name: name, ans: ans, count: c };
  var now = new Date().toLocaleString('he-IL');
  rsvpData.push({ name: name, ans: ans, count: c, ts: now });
  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(entry)
  }).catch(function(err) { console.error(err); });
  document.getElementById('successBox').classList.add('show');
  document.getElementById('submitBtn').disabled = true;
  setTimeout(function() {
    document.getElementById('guestName').value = '';
    ans = null;
    count = 1;
    var btns = document.querySelectorAll('.toggle-btn');
    for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('sel'); }
    document.getElementById('countSection').style.display = 'none';
    document.getElementById('countNum').textContent = '1';
    document.getElementById('successBox').classList.remove('show');
    validate();
  }, 3000);
}

function toggleAdmin() {
  document.getElementById('adminPanel').classList.toggle('open');
}

function checkPw() {
  var val = document.getElementById('pwInput').value;
  if (val === PW) {
    document.getElementById('pwSection').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    loadFromSheets();
  } else {
    document.getElementById('pwErr').textContent = 'סיסמה שגויה';
    document.getElementById('pwInput').value = '';
  }
}

function loadFromSheets() {
  document.getElementById('adminTbody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:#bbb;padding:20px">טוען...</td></tr>';
  fetch(SCRIPT_URL)
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.status === 'ok') {
        rsvpData = res.data;
        renderAdmin();
      }
    })
    .catch(function() {
      document.getElementById('adminTbody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:#a84040;padding:20px">שגיאה בטעינה</td></tr>';
    });
}

function renderAdmin() {
  var rows = rsvpData;
  var yes = rows.filter(function(r) { return r.ans === 'yes'; });
  var no = rows.filter(function(r) { return r.ans === 'no'; });
  document.getElementById('aYes').textContent = yes.length;
  document.getElementById('aNo').textContent = no.length;
  var total = 0;
  for (var i = 0; i < yes.length; i++) { total += (yes[i].count || 0); }
  document.getElementById('aTotal').textContent = total;
  if (rows.length === 0) {
    document.getElementById('adminTbody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:#bbb;padding:20px">אין תשובות עדיין</td></tr>';
    return;
  }
  var html = '';
  for (var j = 0; j < rows.length; j++) {
    var r = rows[j];
    var badge = (r.ans === 'yes') ? 'badge-yes' : 'badge-no';
    var label = (r.ans === 'yes') ? 'כן' : 'לא';
    var qty = (r.ans === 'yes') ? r.count : '-';
    html += '<tr>';
    html += '<td>' + (j+1) + '</td>';
    html += '<td><strong>' + r.name + '</strong></td>';
    html += '<td><span class="badge ' + badge + '">' + label + '</span></td>';
    html += '<td>' + qty + '</td>';
    html += '</tr>';
  }
  document.getElementById('adminTbody').innerHTML = html;
}

function exportCSV() {
  var rows = rsvpData;
  if (!rows.length) { alert('אין נתונים לייצוא'); return; }
  var lines = [];
  lines.push('מספר,שם,תשובה,כמות,זמן');
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var ans2 = (r.ans === 'yes') ? 'מגיע' : 'לא מגיע';
    var cnt = (r.ans === 'yes') ? r.count : 0;
    lines.push((i+1) + ',"' + r.name + '","' + ans2 + '",' + cnt + ',"' + (r.ts||'') + '"');
  }
  var csv = lines.join('\r\n');
  var bom = '\uFEFF';
  var blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'alon_barmitzvah_rsvp.csv';
  a.click();
}

function resetAll() {
  alert('למחיקה: פתח את Google Sheets ומחק את השורות ידנית, לאחר מכן לחץ רענן.');
}
</script>
</body>
</html>
